<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Repos</title>
  <link rel="stylesheet" href="newtab.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="header-inner">
        <h1 class="title">
          <svg class="github-logo" viewBox="0 0 16 16" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
              0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
              -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87
              2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95
              0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82
              .64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82
              2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87
              3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0
              .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
          My GitHub Repositories
        </h1>
        <a class="settings-link" href="options.html" target="_blank" title="Settings">
          <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98
              0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106
              2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0
              2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106
              2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978
              0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734
              2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379
              1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532
              1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z"
              clip-rule="evenodd"/>
          </svg>
          Settings
        </a>
      </div>
    </header>

    <!-- ── Bookmark bar ─────────────────────────────────── -->
    <div class="bookmark-bar" id="bookmark-bar">
      <div class="bookmark-bar-inner">
        <div class="bookmark-list" id="bookmark-list"></div>
        <button class="bookmark-add-btn" id="bookmark-add-btn" title="Add bookmark">
          <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M7.75 2a.75.75 0 01.75.75V7h4.25a.75.75 0 010 1.5H8.5v4.25a.75.75 0 01-1.5 0V8.5H2.75a.75.75 0 010-1.5H7V2.75A.75.75 0 017.75 2z"/></svg>
          Add
        </button>
      </div>
    </div>

    <main class="main">
      <!-- ── Search box ──────────────────────────────────── -->
      <div class="search-sort-wrap">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M10.68 11.74a6 6 0 01-7.922-8.982 6 6 0 018.982 7.922l3.04 3.04a.749.749 0 01-.326 1.275.749.749 0 01-.734-.215l-3.04-3.04zM11.5 7a4.499 4.499 0 11-8.997 0A4.499 4.499 0 0111.5 7z"/>
          </svg>
          <input type="search" id="search-input" class="search-input" placeholder="Search repositories…" autocomplete="off" spellcheck="false" />
        </div>
        <div class="sort-wrap">
          <label for="sort-select" class="sort-label">Sort:</label>
          <select id="sort-select" class="sort-select">
            <option value="default">Default</option>
            <option value="pushed">Last Pushed</option>
            <option value="name">Name</option>
          </select>
        </div>
      </div>

      <div id="status" class="status hidden"></div>
      <div id="repo-grid" class="repo-grid"></div>
      <div id="see-more-wrap" class="see-more-wrap hidden">
        <button id="see-more-btn" class="see-more-btn">See More</button>
      </div>
    </main>
  </div>

  <!-- ── Bookmark modal ──────────────────────────────────── -->
  <div class="modal-overlay hidden" id="bookmark-modal">
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <h3 class="modal-title" id="modal-title">Add Bookmark</h3>
      <div class="modal-field">
        <label for="bm-url">URL</label>
        <input type="url" id="bm-url" placeholder="https://example.com" autocomplete="off" />
      </div>
      <div class="modal-field">
        <label for="bm-title">Title</label>
        <input type="text" id="bm-title" placeholder="My Website" autocomplete="off" />
      </div>
      <p class="modal-error hidden" id="bm-error"></p>
      <div class="modal-actions">
        <button class="modal-btn modal-cancel" id="bm-cancel">Cancel</button>
        <button class="modal-btn modal-save" id="bm-save">Save</button>
      </div>
    </div>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
